name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build API img
        run: docker build -t ticketing-api:${{ github.sha }} ./api

      - name: Build Frontend img
        run: docker build -t ticketing-frontend:${{ github.sha }} ./frontend

      - name: Build Worker img
        run: docker build -t ticketing-worker:${{ github.sha }} ./worker

      - name: Scan API Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-api-report.txt

      - name: Scan Fronted Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-frontend:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-frontend-report.txt

      - name: Scan Worker Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-worker:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-worker-report.txt

      - name: Save Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.txt
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Push Container
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag ticketing-api:${{ github.sha }} ghcr.io/${{ github.repository }}/ticketing-api:${{ github.sha }}
          docker tag ticketing-frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/ticketing-frontend:${{ github.sha }}
          docker tag ticketing-worker:${{ github.sha }} ghcr.io/${{ github.repository }}/ticketing-worker:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/ticketing-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/ticketing-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/ticketing-worker:${{ github.sha }}
