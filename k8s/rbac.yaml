apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticketing-sa
  namespace: ticketing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ticketing-role
  namespace: ticketing
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ticketing-rolebinding
  namespace: ticketing
subjects:
- kind: ServiceAccount
  name: ticketing-sa
  namespace: ticketing
roleRef:
  kind: Role
  name: ticketing-role
  apiGroup: rbac.authorization.k8s.io
